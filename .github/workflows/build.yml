name: Build & Publish Desktop Apps

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"

jobs:
  compile:
    name: Build & Publish App (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Source Tree
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "yarn"

      - name: Install Project Dependencies
        run: yarn install --frozen-lockfile

      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Configure Release Flags Dynamically
        shell: bash
        run: |
          # Si le tag contient un trait d'union (ex: v1.2.0-beta.2), on le considère comme pre-release
          if [[ "${{ github.ref_name }}" == *"-"* ]]; then
            echo "EP_PRE_RELEASE=true" >> $GITHUB_ENV
          else
            echo "EP_PRE_RELEASE=false" >> $GITHUB_ENV
          fi
          echo "EP_DRAFT=false" >> $GITHUB_ENV

      - name: Build & Upload Assets to GitHub Release
        run: yarn build:all --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_PRE_RELEASE: ${{ env.EP_PRE_RELEASE }}
          EP_DRAFT: ${{ env.EP_DRAFT }}
