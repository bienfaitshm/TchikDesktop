name: Continuous Compilation & Deployment (Build)

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "**.md"
      - ".idea/**"
      - ".vscode/**"
      - ".gitignore"
      - ".github/**"
      - "!.github/workflows/build.yml"

permissions:
  contents: write

jobs:
  compile:
    name: Build & Publish Tchik (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest] # Tu pourras ajouter windows-latest ici plus tard

    steps:
      - name: Checkout Source Tree
        uses: actions/checkout@v4

      - name: Initialize Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Project Dependencies
        run: npm install --legacy-peer-deps

      # Configuration Linux pour la génération des paquets (.deb, rpm, etc.)
      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      # Étape clé : Détermination dynamique du type de release
      - name: Set Release Type Environment
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "RELEASE_TYPE=release" >> $GITHUB_ENV
          else
            echo "RELEASE_TYPE=prerelease" >> $GITHUB_ENV
          fi

      # Compilation et publication des fichiers d'installation natifs (Tchik-1.0.0-setup.exe, .deb, etc.)
      - name: Build & Publish Electron App
        run: npm run build:all -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TYPE: ${{ env.RELEASE_TYPE }}
