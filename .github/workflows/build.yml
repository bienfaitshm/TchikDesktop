name: Build & Publish Desktop Apps

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build"
        required: true
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  compile:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: "lts/*", cache: "yarn" }
      - run: yarn install --frozen-lockfile

      - name: Build & Publish
        run: yarn build:all --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Force le build pour le tag reçu en entrée ou le tag actuel
          EP_TAG: ${{ github.event.inputs.tag || github.ref_name }}
