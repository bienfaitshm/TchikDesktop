productName: Tchik
appId: Tchik.electron.app

# Variables d'environnement pour la CI/CD (GitHub Actions)
# Windows: CSC_LINK et CSC_KEY_PASSWORD
# Mac: APPLE_ID et APPLE_ID_PASSWORD

directories:
  buildResources: build
  output: release/${version}

files:
  - '!**/.vscode/**'
  - '!src/**'
  - '!electron.vite.config.*'
  - '!.eslint*'
  - '!.prettier*'
  - '!dev-app-update.yml'
  - '!CHANGELOG.md'
  - '!README.md'
  - '!.env*'
  - '!.npmrc'
  - '!pnpm-lock.yaml'
  - '!tsconfig*.json'

extraFiles:
  - documents_templates/**
  - drizzle/**

asarUnpack:
  - node_modules/sqlite3
  - out/main/chunks/*.node
  - resources/**

win:
  executableName: Tchik
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}_Installer_Windows_${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}_uninstaller
  displayLanguageSelector: true
  createDesktopShortcut: always

mac:
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSCameraUsageDescription: Application requests access to the device's camera.
    NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  notarize: false
    # provider: appleId

dmg:
  artifactName: ${productName}_Installer_MacOs_${version}.${ext}
  icon: build/icon.icns

linux:
  target:
    - target: AppImage
    - target: deb
  maintainer: Bienfait Shomari <bienfaitshm@google.com>
  category: Education
  icon: build/icon.png
  desktop:
    Name: Tchik
    Comment: Gestionnaire Tchik pour l'éducation
    Terminal: false
    Type: Application
    Categories: Education;Utility;
    MimeType: application/tchik
  artifactName: ${productName}_Installer_Linux_${version}.${ext}

appImage:
  artifactName: ${productName}_Installer_Linux_${version}.${ext}

npmRebuild: false

publish:
  provider: github
  owner: bienfaitshm
  repo: TchikDesktop
  releaseType: release
  updaterCacheDirName: tchik-updater