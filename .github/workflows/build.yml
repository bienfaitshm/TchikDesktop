name: Build

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "**.md"
      - "**.spec.js"
      - "**.spec.ts"
      - ".idea"
      - ".vscode"
      - ".dockerignore"
      - "Dockerfile"
      - ".gitignore"
      - ".github/**"
      - "!.github/workflows/build.yml"

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20 || >=24
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Release Files
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: List Output Files
        run: ls -R

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release_${{ github.ref_name }}_${{ matrix.os }}
          path: dist/
          retention-days: 7
