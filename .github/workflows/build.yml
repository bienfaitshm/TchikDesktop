name: Build & Publish Desktop Apps

on:
  push:
    branches:
      - main # Se déclenche sur les pushs vers la branche main
    tags:
      - v*.*.*

    paths-ignore:
      - "**.md"
      - ".idea/**"
      - ".vscode/**"
      - ".gitignore"
      - ".github/**"
      - "!.github/workflows/build.yml"

permissions:
  contents: write

env:
  ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"

jobs:
  compile:
    name: Build & Publish Tchik (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Source Tree
        uses: actions/checkout@v4

      - name: Initialize Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Project Dependencies
        run: npm install --legacy-peer-deps

      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      # Attention : Correction ici pour Windows (le shell par défaut sur windows-latest est PowerShell, pas Bash)
      - name: Configure Electron Builder Release Flags
        shell: bash
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "EP_PRE_RELEASE=false" >> $GITHUB_ENV
            echo "EP_DRAFT=false" >> $GITHUB_ENV
          else
            echo "EP_PRE_RELEASE=true" >> $GITHUB_ENV
            echo "EP_DRAFT=false" >> $GITHUB_ENV
          fi

      # Exécution de la compilation avec les flags natifs injectés
      - name: Build & Publish Electron App
        run: npm run build:all -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_PRE_RELEASE: ${{ env.EP_PRE_RELEASE }}
          EP_DRAFT: ${{ env.EP_DRAFT }}
