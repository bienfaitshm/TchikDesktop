name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      # Tu peux ajouter tes tests ici : run: npm run test ou npm run lint

  check-lockfiles:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check changed files
        id: files
        run: |
          # Liste les fichiers modifiés dans la PR
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          if echo "$CHANGED_FILES" | grep -E 'package-lock.json|yarn.lock|pnpm-lock.yaml'; then
            echo "lockfile_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Filter & Comment Safe Bot Changes
        if: steps.files.outputs.lockfile_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prActor = context.payload.pull_request.user.login;
            if (prActor === 'github-actions[bot]') {
              console.log("Modification par le bot autorisée.");
              return;
            }

            let msg = "⚠️ Les fichiers de lock (*-lock.json) ne doivent pas être modifiés manuellement dans les PRs.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.number,
              body: msg
            });
            core.setFailed("Lockfile modifié par un utilisateur.");

